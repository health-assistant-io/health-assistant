[pytest]
# Only look for tests inside the tests directory
testpaths = tests
# Adds pythonpath to avoid import errors
pythonpath = .
# Automatically loads .env file for environment variables if needed
env_files =
    .env.test
    .env
# Shows clear verbose output for test summaries
addopts = -v --tb=short
# Explicitly sets asyncio mode to auto (which prevents strict warnings)
asyncio_mode = auto