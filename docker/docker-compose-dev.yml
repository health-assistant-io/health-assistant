services:
  # PostgreSQL with TimescaleDB
  postgres-dev1:
    image: timescale/timescaledb:latest-pg14
    container_name: health_assistant-postgres-dev1
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-health_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data-dev1:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-health_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health_assistant-network
    
volumes:
  postgres_data-dev1:
  redis_data:
  uploads:

networks:
  health_assistant-network:
    driver: bridge