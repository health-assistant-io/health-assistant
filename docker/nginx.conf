# Health Assistant - Docker Nginx Configuration (Standalone Flavor)
#
# This file is mounted directly into the Nginx Docker container.
# It uses Docker's internal DNS to route traffic to the other containers.

server {
    listen 80;
    server_name _; # Catch-all, or replace with your domain

    # Global proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Backend API (FastAPI)
    location /api/ {
        proxy_pass http://backend:8000;
        
        # Extended timeouts for long-running background tasks (e.g., AI extractions)
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        
        # Support for Server-Sent Events (SSE) and WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # 2. Backend Documentation (Swagger UI & OpenAPI JSON)
    location ~ ^/(docs|openapi.json) {
        proxy_pass http://backend:8000;
    }

    # 3. Flower (Celery Monitoring UI)
    location /flower/ {
        proxy_pass http://flower:5555;
        
        # WebSocket support for Flower's real-time task updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    # 4. Frontend (React/Vite Preview)
    # This must be the last block to act as a catch-all for React Router routes.
    location / {
        proxy_pass http://frontend:3000;
    }
}