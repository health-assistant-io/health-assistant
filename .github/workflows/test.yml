name: Reusable Test Suite

on:
  workflow_call:

jobs:
  test-backend:
    name: Run Backend Pytest Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: health_assistant_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d health_assistant_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest Suite
        env:
          # Configure via parts (not DATABASE_URL) so config.py assembles the
          # URL and the b13 security-hygiene tests exercise POSTGRES_PASSWORD.
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: health_assistant_test
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          # Mirror production Docker PYTHONPATH (/app/backend:/app) so the
          # top-level `integrations` package is importable during tests.
          export PYTHONPATH="$(cd .. && pwd):$(pwd)"
          pytest

  test-frontend:
    name: Run Frontend Lint & Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Lint & Build Test
        run: |
          cd frontend
          npm run lint
          npm run build
